# Sentinel — Subnetz-Definitionen
# Mehrere Subnetze werden unterstützt (z.B. LAN + DMZ).

[[subnets]]
name = "LAN"
description = "Lokales Netzwerk"
interface = "eth1"          # Vom Installer gesetzt
network = "192.168.1.0/24"  # CIDR-Notation
gateway = "192.168.1.1"
dhcp_enabled = true
dhcp_start = "192.168.1.100"
dhcp_end = "192.168.1.200"
dns_enabled = true
vlan_id = 0                 # 0 = kein VLAN

