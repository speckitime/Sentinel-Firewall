# Sentinel — WireGuard VPN Konfiguration
# Private Keys werden vom Installer generiert und niemals hier gespeichert.

[server]
interface = "wg0"
listen_port = 51820
address = "10.8.0.1/24"
public_key = ""      # Wird vom Installer gesetzt

# WireGuard Peers werden über das Dashboard verwaltet.
# Beispiel (auskommentiert):
# [[peers]]
