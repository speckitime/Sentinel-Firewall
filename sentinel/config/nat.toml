# Sentinel — NAT / Port-Forwarding Regeln
# Format: [[port_forwards]]
# Wird automatisch vom Dashboard aktualisiert.

[masquerade]
wan_interface = ""    # Vom Installer gesetzt
enabled = true        # NAT/Masquerading für alle Subnetze

# Port-Forwarding-Regeln
# Beispiel (auskommentiert):
# [[port_forwards]]
# name = "Webserver"
# description = "Interner Nginx-Webserver"
# protocol = "tcp"           # "tcp", "udp", oder "both"
# external_port = 8443
# internal_ip = "192.168.1.10"
# internal_port = 443
# enabled = true

# [[port_forwards]]
# name = "Minecraft"
# description = "Minecraft Server"
# protocol = "tcp"
# external_port = 25565
# internal_ip = "192.168.1.20"
# internal_port = 25565
# enabled = false
