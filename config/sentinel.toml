# Sentinel Firewall — Main Configuration
# Generated by installer.sh — edit carefully

[network]
wan_interface = "eth0"       # WAN interface name
lan_interface = "eth1"       # LAN interface name
lan_subnet    = "10.0.1.0/24"
lan_gateway   = "10.0.1.1"
public_ip     = ""           # Auto-detected at runtime if empty

[api]
host = "127.0.0.1"
port = 8000
cors_origins = ["https://10.0.1.1", "http://localhost:3000"]

[ids]
auto_block         = false
confidence_threshold = 80
eve_log            = "/var/log/suricata/eve.json"

[scanner]
enabled      = true
schedule     = "03:00"
target       = "lan"  # "lan" = scan full LAN subnet
ports        = "1-1024"

[dhcp]
kea_socket   = "/run/kea/kea4-ctrl-socket"
kea_ctrl_url = "http://127.0.0.1:8001/"
lease_file   = "/var/lib/kea/kea-leases4.csv"

[dns]
unbound_conf = "/etc/unbound/unbound.conf.d/sentinel.conf"
forwarders   = ["1.1.1.1", "8.8.8.8"]

[vpn]
wg_interface = "wg0"
wg_conf      = "/etc/wireguard/wg0.conf"
listen_port  = 51820
dns_server   = "10.0.1.1"

[notifications]
email_enabled    = false
telegram_enabled = false
